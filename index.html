<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBB Decision Calculator — West Orange HS</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;padding:24px 16px;min-height:100vh}
  .container{max-width:680px;margin:0 auto}
  h1{font-size:20px;font-weight:500;margin-bottom:4px}
  .subtitle{font-size:13px;color:#888;margin-bottom:28px}
  .sec{margin-bottom:22px}
  .sec-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.07em;font-weight:500;margin:0 0 10px}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .fg{display:flex;flex-direction:column;gap:5px}
  .fg label{font-size:13px;color:#555}
  select,input[type="number"]{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;outline:none}
  select:focus,input:focus{border-color:#888}
  .base-row{display:flex;gap:8px;margin-top:2px}
  .bbase{flex:1;padding:9px 4px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#888;text-align:center;transition:all .15s;user-select:none;font-family:inherit}
  .bbase:hover{border-color:#aaa;color:#555}
  .bbase.on{background:#fff8e6;border-color:#d4a017;color:#8a6200;font-weight:600}
  .go-btn{width:100%;padding:12px;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;background:#1a1a1a;border:none;color:#fff;margin-top:4px;transition:background .15s;font-family:inherit}
  .go-btn:hover{background:#333}
  .mode-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;margin-bottom:14px}
  .mode-walkoff{background:#fef3e2;color:#92550a;border:1px solid #f5c97a}
  .mode-standard{background:#e8f4fd;color:#1a5fa5;border:1px solid #a8d1f0}
  .res{margin-top:20px}
  .verdict-card{border-radius:12px;border:1px solid #e5e5e5;background:#fff;padding:1.25rem 1.5rem;margin-bottom:14px}
  .verdict-big{font-size:24px;font-weight:500;margin:0 0 4px}
  .verdict-sub{font-size:13px;color:#888;margin:0 0 16px}
  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .mc{background:#f5f5f3;border-radius:8px;padding:10px 12px}
  .mc-label{font-size:11px;color:#888;margin:0 0 4px}
  .mc-val{font-size:18px;font-weight:500;color:#1a1a1a;margin:0}
  .mc-sub{font-size:11px;color:#aaa;margin:2px 0 0}
  .we-bar-wrap{margin-top:14px}
  .we-bar-label{font-size:12px;color:#888;margin:0 0 6px}
  .we-track{height:8px;background:#e5e5e5;border-radius:4px;overflow:hidden;margin-bottom:8px}
  .we-fill{height:100%;border-radius:4px;transition:width .5s ease}
  .we-row-label{font-size:11px;color:#888;margin-bottom:3px}
  .breakdown{border-radius:12px;border:1px solid #e5e5e5;background:#fff;padding:1rem 1.25rem}
  .bd-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0f0f0}
  .bd-row:last-child{border-bottom:none}
  .bd-name{font-size:13px;color:#666}
  .bd-vals{display:flex;gap:20px;font-size:13px}
  .bd-v{text-align:right;min-width:54px;color:#1a1a1a}
  .bd-head{font-size:11px;color:#aaa;display:flex;justify-content:space-between;margin-bottom:8px}
  .bd-head-vals{display:flex;gap:20px}
  .bd-hv{min-width:54px;text-align:right}
  .batter-card{background:#f5f5f3;border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;gap:20px;flex-wrap:wrap}
  .bc-stat{display:flex;flex-direction:column;gap:2px}
  .bc-sl{font-size:11px;color:#888}
  .bc-sv{font-size:14px;font-weight:500;color:#1a1a1a}
  .state-note{font-size:12px;color:#888;margin-top:6px;font-style:italic}
  .dp-note{font-size:12px;padding:8px 12px;background:#f0f8f0;border-radius:6px;color:#2a6a2a;margin-top:8px;border:1px solid #c3e0c3;display:none}
  @media(max-width:500px){.g3{grid-template-columns:1fr 1fr}.metrics{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
  <h1>IBB Decision Calculator</h1>
  <p class="subtitle">West Orange HS (away) vs PCT (home) — Jack Pimm on the mound</p>

  <div class="sec">
    <p class="sec-label">Batter selection</p>
    <div class="g2">
      <div class="fg"><label>Current batter</label><select id="batter"></select></div>
      <div class="fg"><label>On-deck batter</label><select id="ondeck"></select></div>
    </div>
  </div>

  <div id="batter-stats" style="display:none" class="batter-card"></div>

  <div class="sec">
    <p class="sec-label">Game situation</p>
    <div class="g3" style="margin-bottom:12px">
      <div class="fg"><label>Inning</label>
        <select id="inn">
          <option value="1">1st</option><option value="2">2nd</option><option value="3">3rd</option>
          <option value="4">4th</option><option value="5">5th</option><option value="6">6th</option>
          <option value="7" selected>7th</option>
        </select>
      </div>
      <div class="fg"><label>Half</label>
        <select id="half">
          <option value="bot">Bottom (we're pitching)</option>
          <option value="top">Top (we're batting)</option>
        </select>
      </div>
      <div class="fg"><label>Outs</label>
        <select id="outs">
          <option value="0">0 outs</option>
          <option value="1" selected>1 out</option>
          <option value="2">2 outs</option>
        </select>
      </div>
    </div>
    <div class="g2">
      <div class="fg"><label>Our score (West Orange)</label><input type="number" id="us" value="3" min="0" max="30"></div>
      <div class="fg"><label>Their score (PCT)</label><input type="number" id="them" value="3" min="0" max="30"></div>
    </div>
  </div>

  <div class="sec">
    <p class="sec-label">Baserunners — click to toggle</p>
    <div class="base-row">
      <button class="bbase" id="b1" onclick="tog(1)">&#9670; 1st base</button>
      <button class="bbase" id="b2" onclick="tog(2)">&#9670; 2nd base</button>
      <button class="bbase" id="b3" onclick="tog(3)">&#9670; 3rd base</button>
    </div>
    <p id="state-note" class="state-note"></p>
    <p id="dp-note" class="dp-note"></p>
  </div>

  <div class="sec">
    <p class="sec-label">Count</p>
    <div class="g2">
      <div class="fg"><label>Balls</label>
        <select id="balls"><option value="0" selected>0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
      </div>
      <div class="fg"><label>Strikes</label>
        <select id="strikes"><option value="0" selected>0</option><option value="1">1</option><option value="2">2</option></select>
      </div>
    </div>
  </div>

  <button class="go-btn" onclick="calc()">Run analysis &rarr;</button>
  <div id="res" class="res"></div>
</div>

<script>
var ROSTER=[
  {name:"Mickey Gilligan #12",  ab:68, h:42, s:18,d:8, t:4, hr:12,bb:25,hbp:9, sf:0},
  {name:"Randis Rosario #4",    ab:90, h:44, s:23,d:13,t:0, hr:8, bb:15,hbp:5, sf:0},
  {name:"Melvin Genao #6",      ab:96, h:55, s:42,d:10,t:2, hr:1, bb:17,hbp:1, sf:0},
  {name:"Francis Juliano #24",  ab:75, h:23, s:9, d:7, t:1, hr:6, bb:25,hbp:6, sf:0},
  {name:"Yordany Herrera #2",   ab:77, h:27, s:15,d:8, t:1, hr:3, bb:15,hbp:4, sf:0},
  {name:"Ronny Rodriguez #8",   ab:80, h:35, s:25,d:5, t:0, hr:5, bb:8, hbp:4, sf:0},
  {name:"Devin Gerena #3",      ab:63, h:15, s:13,d:2, t:0, hr:0, bb:11,hbp:5, sf:2},
  {name:"Justin Brown #5",      ab:63, h:17, s:10,d:6, t:0, hr:1, bb:5, hbp:0, sf:0},
  {name:"Jandiel Ortiz #20",    ab:44, h:8,  s:6, d:1, t:0, hr:1, bb:10,hbp:9, sf:0},
  {name:"Devin Pollock #23",    ab:20, h:6,  s:5, d:1, t:0, hr:0, bb:3, hbp:1, sf:0},
  {name:"Tyler Meyers #7",      ab:23, h:4,  s:4, d:0, t:0, hr:0, bb:6, hbp:1, sf:1},
];

function woba(p){var pa=p.ab+p.bb+p.hbp+p.sf;if(pa===0)return 0;return(0.69*p.bb+0.72*p.hbp+0.89*p.s+1.27*p.d+1.62*p.t+2.10*p.hr)/pa;}
function avgStat(p){return p.ab>0?p.h/p.ab:0;}
function slg(p){return p.ab>0?(p.s+2*p.d+3*p.t+4*p.hr)/p.ab:0;}
function obp(p){var pa=p.ab+p.bb+p.hbp+p.sf;return pa>0?(p.h+p.bb+p.hbp)/pa:0;}
var avgWoba=ROSTER.reduce(function(s,p){return s+woba(p);},0)/ROSTER.length;

// Double play probability: scales with fly ball tendency (inverse of HR rate)
// High HR% = more fly balls = fewer DPs. Base DP% ~15% for avg hitter with 1B occupied, 1 out.
function dpProb(p){
  var hrRate=p.hr/Math.max(p.ab,1);
  return Math.max(0.05,Math.min(0.20,0.15-hrRate*0.8));
}

// P(score >= 1 run) by base-out state — used in walk-off mode
var PS={
  "000":{0:0.282,1:0.167,2:0.069},
  "100":{0:0.441,1:0.271,2:0.130},
  "020":{0:0.622,1:0.419,2:0.228},
  "003":{0:0.853,1:0.694,2:0.266},
  "120":{0:0.644,1:0.429,2:0.234},
  "103":{0:0.868,1:0.709,2:0.287},
  "023":{0:0.849,1:0.678,2:0.305},
  "123":{0:0.882,1:0.730,2:0.369},
};

// Run expectancy — used in standard mode
var RE={
  "000":{0:0.555,1:0.297,2:0.117},
  "100":{0:0.953,1:0.573,2:0.251},
  "020":{0:1.189,1:0.725,2:0.344},
  "003":{0:1.482,1:0.983,2:0.387},
  "120":{0:1.587,1:0.971,2:0.463},
  "103":{0:1.880,1:1.259,2:0.521},
  "023":{0:2.116,1:1.411,2:0.604},
  "123":{0:2.414,1:1.685,2:0.757},
};

function baseKey(b1,b2,b3){return(b1?'1':'0')+(b2?'2':'0')+(b3?'3':'0');}
function pitcherAdj(){return Math.max(0.5,Math.min(1.5,2.40/4.50));}

function walkNewState(b1,b2,b3){
  var n1=true,n2=b2,n3=b3,runScores=false;
  if(b1){n2=true;if(b2){n3=true;if(b3){runScores=true;}}}
  return{b1:n1,b2:n2,b3:n3,runScores:runScores};
}

function normCDF(x){
  var t=1/(1+0.2316419*Math.abs(x));
  var d=0.3989423*Math.exp(-x*x/2);
  var p=d*t*(0.3193815+t*(-0.3565638+t*(1.7814779+t*(-1.8212560+t*1.3302744))));
  return x>0?1-p:p;
}

/*
  WALK-OFF MODE (bottom >= 6th inning, tie or down by 1):
    Only one run matters. WE = 1 - P(they score >= 1 run this half inning).
    Batter adjustment: scale P(score) by batter's wOBA relative to average.
    DP credit: if walk creates a force at 1st, the on-deck batter has a DP chance.
      P(DP) * 0 runs + P(no DP) * P(score without DP) — gives credit for inning-ending DP.

  STANDARD MODE (all other situations):
    WE shifts by the marginal run delta of the decision (batter contribution only, not full RE).
*/
function isWalkoffMode(inning, isBot, us, them){
  var diff = us - them; // positive = we lead
  // We're pitching (bottom half), late inning, game is close (tied or we're up by 1 = they're down 1)
  return isBot && inning >= 6 && diff >= -1 && diff <= 1;
  // diff >= -1 means we're not down by more than 1
  // diff <= 1 means they need 1 run to tie or take lead
}

function batAdjPS(basePS, batter, avgWoba){
  // Adjust base P(score) by batter quality. Elite hitter ~+10%, weak hitter ~-8%.
  var wobaRatio = woba(batter) / Math.max(avgWoba, 0.01);
  var adj = (wobaRatio - 1.0) * 0.15; // scale factor
  return Math.min(0.97, Math.max(0.03, basePS + adj));
}

function weWalkoff(b1, b2, b3, outs, batter, ondeck, pitAdj){
  var key = baseKey(b1,b2,b3);
  var basePS = PS[key] ? PS[key][outs] : 0.3;

  // P(score) if we pitch to current batter
  var pScorePitch = batAdjPS(basePS, batter, avgWoba);

  // Walk: new base state + on-deck batter faces us, with possible DP
  var ws = walkNewState(b1,b2,b3);
  var newKey = baseKey(ws.b1,ws.b2,ws.b3);
  var basePS_walk = PS[newKey] ? PS[newKey][outs] : 0.3;
  var pScoreWalkBase = batAdjPS(basePS_walk, ondeck, avgWoba);

  // DP credit: only available with 1 out and runner on 1st after walk
  var dpCredit = 0;
  if(outs === 1 && ws.b1){
    var dp = dpProb(ondeck);
    // If DP: P(score)=0 (runner on 2nd can't score on standard 6-4-3 before 3rd out)
    // unless runner is on 3rd (could tag and score on first out of DP)
    var pScoreOnDP = ws.b3 ? 0.5 : 0.0; // runner on 3rd might score on first out
    dpCredit = dp * (pScoreOnDP - pScoreWalkBase); // negative = helps us
    pScoreWalkBase = dp * pScoreOnDP + (1 - dp) * pScoreWalkBase;
  }

  // If walk itself scores a run (bases were loaded — handled separately)
  if(ws.runScores){ pScoreWalkBase = 1.0; }

  return {
    wePitch: 1 - pScorePitch,
    weWalk:  1 - pScoreWalkBase,
    pScorePitch: pScorePitch,
    pScoreWalk:  pScoreWalkBase,
    dpCredit: dpCredit,
    mode: 'walkoff'
  };
}

function weStandard(b1, b2, b3, outs, inning, us, them, isBot, batter, ondeck, balls, strikes){
  var pitAdj = pitcherAdj();
  var reNow = RE[baseKey(b1,b2,b3)][outs];

  // Pitch: batter's marginal contribution above average, count-adjusted
  var batMargin = (woba(batter) - avgWoba) * 1.15 * pitAdj;
  var countMult = 1 + (balls * 0.04 - strikes * 0.05);
  countMult = Math.max(0.7, Math.min(1.4, countMult));
  var reDeltaPitch = batMargin * countMult;

  // Walk: state RE delta + on-deck margin
  var ws = walkNewState(b1,b2,b3);
  var reAfterWalk = RE[baseKey(ws.b1,ws.b2,ws.b3)][outs];
  var reStateDelta = reAfterWalk - reNow;
  var odMargin = (woba(ondeck) - avgWoba) * 1.15 * pitAdj;
  var reDeltaWalk = reStateDelta + odMargin + (ws.runScores ? 1 : 0);

  // DP credit in standard mode: reduces effective walk RE delta
  var dpCreditRE = 0;
  if(outs === 1 && ws.b1){
    var dp = dpProb(ondeck);
    // DP eliminates ~2 outs worth of RE opportunity (~0.5 runs saved on average)
    dpCreditRE = dp * 0.5;
    reDeltaWalk -= dpCreditRE;
  }

  var scoreDiff = us - them;
  var inningsRem = isBot
    ? Math.max(0,(7-inning))+(2-outs)/3
    : Math.max(0,(7-inning)+0.5)+(2-outs)/3;
  var sigma = Math.sqrt(Math.max(inningsRem,0.1)*0.9+0.3);

  function we(delta){
    var eff = isBot ? (scoreDiff - delta) : (scoreDiff + delta);
    return Math.min(0.99, Math.max(0.01, normCDF(eff/sigma)));
  }

  return {
    weNow:   we(0),
    wePitch: we(reDeltaPitch),
    weWalk:  we(reDeltaWalk),
    reDeltaPitch: reDeltaPitch,
    reDeltaWalk:  reDeltaWalk,
    reNow:        reNow,
    reAfterWalk:  reAfterWalk,
    reStateDelta: reStateDelta,
    batMargin:    batMargin * countMult,
    odMargin:     odMargin,
    countMult:    countMult,
    dpCreditRE:   dpCreditRE,
    mode: 'standard'
  };
}

var bases={1:false,2:false,3:false};
function tog(n){
  bases[n]=!bases[n];
  document.getElementById('b'+n).classList.toggle('on',bases[n]);
  updateStateNote();
}

function updateStateNote(){
  var b1=bases[1],b2=bases[2],b3=bases[3];
  var ws=walkNewState(b1,b2,b3);
  var parts=[];
  if(b1)parts.push('1st');if(b2)parts.push('2nd');if(b3)parts.push('3rd');
  var current=parts.length===0?'Bases empty':('Runners on '+parts.join(', '));
  var wparts=[];
  if(ws.b1)wparts.push('1st');if(ws.b2)wparts.push('2nd');if(ws.b3)wparts.push('3rd');
  var after=wparts.length===3?'bases loaded':('runners on '+wparts.join(', '));
  var note=current+' \u2192 a walk puts '+after;
  if(ws.runScores)note+=' (run scores automatically)';
  document.getElementById('state-note').textContent=note;

  // Show DP note if walk creates a force at 1st with 1 out
  var outsVal=parseInt(document.getElementById('outs').value);
  var dpEl=document.getElementById('dp-note');
  if(outsVal===1&&ws.b1&&!(b1&&b2&&b3)){
    var odName=document.getElementById('ondeck').value;
    var od=ROSTER.find(function(p){return p.name===odName;});
    var dp=od?dpProb(od):0.12;
    dpEl.style.display='block';
    dpEl.textContent='Double play window: walk creates 1st & 2nd (or loaded) with 1 out. Est. DP% for on-deck batter: '+(dp*100).toFixed(0)+'%';
  } else {
    dpEl.style.display='none';
  }
}

function populateSelect(id,selectedName){
  var sel=document.getElementById(id);sel.innerHTML='';
  ROSTER.forEach(function(p){
    var o=document.createElement('option');
    o.value=p.name;o.textContent=p.name;
    if(p.name===selectedName)o.selected=true;
    sel.appendChild(o);
  });
}
populateSelect('batter','Mickey Gilligan #12');
populateSelect('ondeck','Randis Rosario #4');
document.getElementById('batter').addEventListener('change',showBatterStats);
document.getElementById('ondeck').addEventListener('change',updateStateNote);
document.getElementById('outs').addEventListener('change',updateStateNote);
updateStateNote();

function showBatterStats(){
  var name=document.getElementById('batter').value;
  var p=ROSTER.find(function(x){return x.name===name;});
  var el=document.getElementById('batter-stats');
  if(!p){el.style.display='none';return;}
  var pa=p.ab+p.bb+p.hbp+p.sf;
  el.style.display='flex';
  el.innerHTML=
    '<div class="bc-stat"><span class="bc-sl">AVG</span><span class="bc-sv">'+avgStat(p).toFixed(3)+'</span></div>'+
    '<div class="bc-stat"><span class="bc-sl">OBP</span><span class="bc-sv">'+obp(p).toFixed(3)+'</span></div>'+
    '<div class="bc-stat"><span class="bc-sl">SLG</span><span class="bc-sv">'+slg(p).toFixed(3)+'</span></div>'+
    '<div class="bc-stat"><span class="bc-sl">wOBA</span><span class="bc-sv">'+woba(p).toFixed(3)+'</span></div>'+
    '<div class="bc-stat"><span class="bc-sl">HR</span><span class="bc-sv">'+p.hr+'</span></div>'+
    '<div class="bc-stat"><span class="bc-sl">BB</span><span class="bc-sv">'+p.bb+'</span></div>'+
    '<div class="bc-stat"><span class="bc-sl">PA</span><span class="bc-sv">'+pa+'</span></div>';
}
showBatterStats();

function calc(){
  var bName=document.getElementById('batter').value;
  var odName=document.getElementById('ondeck').value;
  var batter=ROSTER.find(function(p){return p.name===bName;});
  var ondeck=ROSTER.find(function(p){return p.name===odName;});
  var inning=parseInt(document.getElementById('inn').value);
  var isBot=document.getElementById('half').value==='bot';
  var outs=parseInt(document.getElementById('outs').value);
  var us=parseInt(document.getElementById('us').value)||0;
  var them=parseInt(document.getElementById('them').value)||0;
  var balls=parseInt(document.getElementById('balls').value);
  var strikes=parseInt(document.getElementById('strikes').value);
  var b1=bases[1],b2=bases[2],b3=bases[3];
  var el=document.getElementById('res');
  var pitAdj=pitcherAdj();

  if(b1&&b2&&b3){
    el.innerHTML='<div class="verdict-card"><p class="verdict-big" style="color:#c0392b">Do not walk — bases loaded</p><p class="verdict-sub">An intentional walk with the bases loaded scores a run automatically.</p></div>';
    return;
  }

  var walkoff=isWalkoffMode(inning,isBot,us,them);
  var r, weNow;

  if(walkoff){
    r=weWalkoff(b1,b2,b3,outs,batter,ondeck,pitAdj);
    weNow=0.5; // in walk-off mode, "now" is just before any action
  } else {
    r=weStandard(b1,b2,b3,outs,inning,us,them,isBot,batter,ondeck,balls,strikes);
    weNow=r.weNow;
  }

  var wePitch=r.wePitch, weWalk=r.weWalk;
  var weCompare=weWalk-wePitch;

  var verdict,vsub,vcolor;
  if(weCompare>0.03){verdict='Walk him';vsub='Win expectancy is meaningfully higher by issuing the intentional walk.';vcolor='#1a7a4a';}
  else if(weCompare>0.01){verdict='Lean toward walking';vsub="A slight WE edge for the walk — worth considering with your pitcher's confidence.";vcolor='#b07d00';}
  else if(weCompare>-0.01){verdict='Toss-up';vsub="The numbers are essentially even. Trust your pitcher's matchup feel.";vcolor='#1a5fa5';}
  else if(weCompare>-0.03){verdict='Lean toward pitching';vsub="A slight WE edge for pitching to him — the next batter isn't enough of a downgrade.";vcolor='#b07d00';}
  else{verdict='Pitch to him';vsub="Win expectancy is higher by pitching to the batter. Don't give him a free pass.";vcolor='#c0392b';}

  function fmt(v){return v>=0?'+'+v.toFixed(2):v.toFixed(2);}
  function fmtPct(v){return (v*100).toFixed(1)+'%';}

  var modeBadge=walkoff
    ? '<span class="mode-badge mode-walkoff">&#9651; Walk-off mode — single run matters</span>'
    : '<span class="mode-badge mode-standard">&#9675; Standard mode — multi-run context</span>';

  var breakdownRows='';
  if(walkoff){
    breakdownRows=
      '<div class="bd-row"><span class="bd-name">P(they score) if pitched to</span><div class="bd-vals"><span class="bd-v">'+(r.pScorePitch*100).toFixed(1)+'%</span><span class="bd-v">&mdash;</span></div></div>'+
      '<div class="bd-row"><span class="bd-name">P(they score) if walked</span><div class="bd-vals"><span class="bd-v">&mdash;</span><span class="bd-v">'+(r.pScoreWalk*100).toFixed(1)+'%</span></div></div>'+
      (outs===1?'<div class="bd-row"><span class="bd-name">On-deck DP% (1 out, force)</span><div class="bd-vals"><span class="bd-v">&mdash;</span><span class="bd-v">'+(dpProb(ondeck)*100).toFixed(0)+'%</span></div></div>':'');
  } else {
    breakdownRows=
      '<div class="bd-row"><span class="bd-name">Base state RE now</span><div class="bd-vals"><span class="bd-v">'+r.reNow.toFixed(3)+'</span><span class="bd-v">'+r.reNow.toFixed(3)+'</span></div></div>'+
      '<div class="bd-row"><span class="bd-name">RE after walk state</span><div class="bd-vals"><span class="bd-v">&mdash;</span><span class="bd-v">'+r.reAfterWalk.toFixed(3)+'</span></div></div>'+
      '<div class="bd-row"><span class="bd-name">RE state delta</span><div class="bd-vals"><span class="bd-v">&mdash;</span><span class="bd-v">'+fmt(r.reStateDelta)+'</span></div></div>'+
      '<div class="bd-row"><span class="bd-name">Batter marginal RE</span><div class="bd-vals"><span class="bd-v">'+fmt(r.batMargin)+'</span><span class="bd-v">&mdash;</span></div></div>'+
      '<div class="bd-row"><span class="bd-name">On-deck marginal RE</span><div class="bd-vals"><span class="bd-v">&mdash;</span><span class="bd-v">'+fmt(r.odMargin)+'</span></div></div>'+
      (r.dpCreditRE>0?'<div class="bd-row"><span class="bd-name">DP credit (RE saved)</span><div class="bd-vals"><span class="bd-v">&mdash;</span><span class="bd-v">'+fmt(-r.dpCreditRE)+'</span></div></div>':'')+
      '<div class="bd-row"><span class="bd-name">Total RE delta</span><div class="bd-vals"><span class="bd-v">'+fmt(r.reDeltaPitch)+'</span><span class="bd-v">'+fmt(r.reDeltaWalk)+'</span></div></div>'+
      '<div class="bd-row"><span class="bd-name">Count adjustment</span><div class="bd-vals"><span class="bd-v">'+r.countMult.toFixed(2)+'x</span><span class="bd-v">&mdash;</span></div></div>'+
      '<div class="bd-row"><span class="bd-name">WE now (West Orange)</span><div class="bd-vals"><span class="bd-v">'+fmtPct(weNow)+'</span><span class="bd-v"></span></div></div>';
  }

  el.innerHTML=
    modeBadge+
    '<div class="verdict-card">'+
      '<p class="verdict-big" style="color:'+vcolor+'">'+verdict+'</p>'+
      '<p class="verdict-sub">'+vsub+'</p>'+
      '<div class="metrics">'+
        '<div class="mc"><p class="mc-label">WE if pitched to</p><p class="mc-val">'+fmtPct(wePitch)+'</p><p class="mc-sub">'+(walkoff?'P(no score): '+fmtPct(1-r.pScorePitch):fmt((wePitch-weNow)*100)+'% vs now')+'</p></div>'+
        '<div class="mc"><p class="mc-label">WE if walked</p><p class="mc-val">'+fmtPct(weWalk)+'</p><p class="mc-sub">'+(walkoff?'P(no score): '+fmtPct(1-r.pScoreWalk):fmt((weWalk-weNow)*100)+'% vs now')+'</p></div>'+
        '<div class="mc"><p class="mc-label">WE delta (walk &minus; pitch)</p><p class="mc-val" style="color:'+(weCompare>0?'#1a7a4a':weCompare<0?'#c0392b':'#1a1a1a')+'">'+fmt(weCompare*100)+'%</p><p class="mc-sub">positive = walk better</p></div>'+
      '</div>'+
      '<div class="we-bar-wrap">'+
        '<p class="we-bar-label">West Orange win expectancy</p>'+
        '<p class="we-row-label">Pitch to him &mdash; '+fmtPct(wePitch)+'</p>'+
        '<div class="we-track"><div class="we-fill" style="width:'+parseFloat((wePitch*100).toFixed(1))+'%;background:#2980b9"></div></div>'+
        '<p class="we-row-label">Walk him &mdash; '+fmtPct(weWalk)+'</p>'+
        '<div class="we-track"><div class="we-fill" style="width:'+parseFloat((weWalk*100).toFixed(1))+'%;background:#1a7a4a"></div></div>'+
      '</div>'+
    '</div>'+
    '<div class="breakdown">'+
      '<div class="bd-head"><span>Factor breakdown</span><div class="bd-head-vals"><span class="bd-hv">Pitch</span><span class="bd-hv">Walk</span></div></div>'+
      breakdownRows+
      '<div class="bd-row"><span class="bd-name">Batter wOBA</span><div class="bd-vals"><span class="bd-v">'+woba(batter).toFixed(3)+'</span><span class="bd-v">&mdash;</span></div></div>'+
      '<div class="bd-row"><span class="bd-name">On-deck wOBA</span><div class="bd-vals"><span class="bd-v">&mdash;</span><span class="bd-v">'+woba(ondeck).toFixed(3)+'</span></div></div>'+
      '<div class="bd-row"><span class="bd-name">On-deck est. DP%</span><div class="bd-vals"><span class="bd-v">&mdash;</span><span class="bd-v">'+(dpProb(ondeck)*100).toFixed(0)+'%</span></div></div>'+
      '<div class="bd-row"><span class="bd-name">Pimm ERA adjustment</span><div class="bd-vals"><span class="bd-v">'+pitcherAdj().toFixed(2)+'x</span><span class="bd-v">'+pitcherAdj().toFixed(2)+'x</span></div></div>'+
    '</div>';
}
</script>
</body>
</html>
